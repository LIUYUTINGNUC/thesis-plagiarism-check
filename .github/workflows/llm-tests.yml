name: LLM Integration Tests

on:
  schedule:
    - cron: "0 6 * * 1"  # 每周一早上6点
  workflow_dispatch:
    inputs:
      provider:
        description: "LLM provider to test"
        required: true
        default: "claude"
        type: choice
        options:
          - claude
          - openai
          - deepseek

jobs:
  llm-test:
    runs-on: ubuntu-latest
    environment: llm-tests

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          pip install -e ".[llm,dev]"

      - name: Run LLM tests
        env:
          LLM_PROVIDER: ${{ github.event.inputs.provider || 'claude' }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: pytest tests/ -v --tb=long -m llm